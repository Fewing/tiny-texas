name: Build and Push Docker Image

on:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    env:
      ACR_REGISTRY: ${{ secrets.ACR_URL }}
      IMAGE_TAG: ${{ secrets.ACR_URL }}/fewings/tiny-texas:latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.ACR_REGISTRY }}
          username: ${{ secrets.ARC_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: Build Docker image
        shell: bash
        run: |
          docker build --tag "$IMAGE_TAG" .

      - name: Push Docker image
        shell: bash
        run: |
          docker push "$IMAGE_TAG"

      - name: Deploy to test server
        shell: bash
        env:
          SSH_HOST: ${{ secrets.SSH_IP }}
          SSH_KEY: ${{ secrets.SSH_KEY }}
          SSH_USER: root
          DEPLOY_DIR: /root/tiny-texas
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/tiny_texas_deploy_key
          chmod 600 ~/.ssh/tiny_texas_deploy_key
          ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts
          ssh -i ~/.ssh/tiny_texas_deploy_key "$SSH_USER@$SSH_HOST" "cd '$DEPLOY_DIR' && docker-compose pull && docker-compose up -d --force-recreate"
