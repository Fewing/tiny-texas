{% extends "base.html" %}
{% block title %}注册 - Tiny Texas{% endblock %}
{% block content %}
<section class="auth-panel">
  <h1>创建账号</h1>
  {% if error %}<p class="alert">{{ error }}</p>{% endif %}
  <form method="post" action="/register" class="stack-form">
    <label>
      用户名
      <input name="username" minlength="3" maxlength="32" autocomplete="username" required>
    </label>
    <label>
      密码
      <input name="password" type="password" minlength="8" autocomplete="new-password" required>
    </label>
    <label>
      邀请码
      <input name="invite_code" autocomplete="off" required>
    </label>
    <button class="button primary" type="submit">注册</button>
  </form>
</section>
{% endblock %}
